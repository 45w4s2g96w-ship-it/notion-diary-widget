<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This Week</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: #fff; color: #111; }
.root { padding: 1.5rem; }
.top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 0.6rem; }
.big-title { font-size: 42px; font-weight: 900; color: #111; line-height: 1; text-transform: uppercase; }
.nav { display: flex; align-items: center; gap: 12px; }
.nav-b { font-size: 7px; color: #111; cursor: pointer; user-select: none; }
.sub { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 2px; text-transform: uppercase; }
.cal { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); border-left: 1.5px solid #111; border-top: 1.5px solid #111; }
.col { border-right: 1.5px solid #111; border-bottom: 1.5px solid #111; }
.col-head { font-size: 9px; font-weight: 700; color: #111; padding: 6px 8px 5px; border-bottom: 1.5px solid #111; background: #fff; letter-spacing: 0.5px; text-transform: uppercase; }
.col-head.today { background: #111; color: #fff; }
.col-body { padding: 8px; min-height: 160px; position: relative; }
.day-text { font-size: 9px; font-weight: 400; color: #222; line-height: 1.7; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 9; -webkit-box-orient: vertical; }
.emp .col-head { color: #ccc; }
.emp .col-body { background: #fafafa; }
.setup { padding: 2rem; max-width: 480px; }
.setup h2 { font-size: 16px; font-weight: 700; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
.field { margin-bottom: 12px; }
.field label { font-size: 11px; font-weight: 700; color: #666; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
.field input { width: 100%; padding: 8px 12px; font-size: 13px; border: 1.5px solid #111; background: #fff; color: #111; outline: none; font-family: 'Montserrat', sans-serif; }
.btn { border: 1.5px solid #111; background: #111; color: #fff; padding: 9px 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat', sans-serif; }
.error { font-size: 11px; color: #c00; margin-top: 8px; }
.settings-btn { font-size: 9px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px; text-align: right; }
.settings-btn:hover { color: #888; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let S = {
  screen: localStorage.getItem('nw_screen') || 'setup',
  apiKey: localStorage.getItem('nw_apiKey') || '',
  dbId: localStorage.getItem('nw_dbId') || '',
  propName: localStorage.getItem('nw_propName') || '에너지 레벨',
  weekOffset: 0,
  entries: {}, loading: false, error: ''
};

function pad(n) { return String(n).padStart(2,'0'); }
function dateKey(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function isToday(d) { return dateKey(d) === dateKey(new Date()); }

function getWeekDays() {
  const today = new Date(); today.setHours(0,0,0,0);
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - today.getDay() + S.weekOffset * 7);
  return Array.from({length:7}, (_,i) => { const d = new Date(sunday); d.setDate(sunday.getDate()+i); return d; });
}

function ec(val) {
  if (val === '높음') return '#EAF3DE';
  if (val === '보통') return '#FAEEDA';
  if (val === '낮음') return '#FCEBEB';
  return '';
}

async function fetchEntries() {
  S.loading = true; S.error = ''; render();
  const days = getWeekDays();
  const start = dateKey(days[0]); const end = dateKey(days[6]);
  try {
    const res = await fetch(`/api/notion/databases/${S.dbId}/query`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${S.apiKey}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
      body: JSON.stringify({ filter: { and: [{ property: '날짜', date: { on_or_after: start } }, { property: '날짜', date: { on_or_before: end } }] }, page_size: 100 })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || '연결 오류');
    S.entries = {};
    (data.results || []).forEach(page => {
      const dateVal = page.properties['날짜']?.date?.start;
      if (!dateVal) return;
      const d = dateVal.slice(0,10);
      const title = (page.properties['이름']?.title || []).map(t=>t.plain_text).join('');
      const energy = page.properties[S.propName]?.select?.name || '';
      const summary = (page.properties['일기 요약']?.rich_text || []).map(t=>t.plain_text).join('');
      S.entries[d] = { id: page.id, energy, summary };
    });
    S.loading = false; render();
  } catch(e) { S.loading = false; S.error = e.message; render(); }
}

function render() {
  document.getElementById('app').innerHTML = S.screen === 'setup' ? setupHTML() : widgetHTML();
  bindEvents();
}

function setupHTML() {
  return `<div class="setup">
    <h2>This Week</h2>
    <div class="field"><label>Notion API Key</label><input type="password" id="f-key" placeholder="secret_..." value="${S.apiKey}"></div>
    <div class="field"><label>Database ID</label><input type="text" id="f-db" placeholder="37451f41..." value="${S.dbId}"></div>
    <div class="field"><label>에너지 레벨 속성명</label><input type="text" id="f-prop" value="${S.propName}"></div>
    ${S.error ? `<div class="error">${S.error}</div>` : ''}
    <div style="margin-top:1.2rem"><button class="btn" id="btn-connect">Connect</button></div>
  </div>`;
}

function widgetHTML() {
  const days = getWeekDays();
  const start = days[0]; const end = days[6];
  const fmt = d => `${MONTHS[d.getMonth()]} ${d.getDate()}`;
  const cols = days.map(d => {
    const key = dateKey(d);
    const entry = S.entries[key];
    const bg = entry ? ec(entry.energy) : '';
    const isEmpty = !entry;
    return `<div class="col${isEmpty?' emp':''}">
      <div class="col-head${isToday(d)?' today':''}">${d.getDate()} ${DAYS[d.getDay()]}.</div>
      <div class="col-body"${bg?` style="background:${bg}"`:''}>${entry ? `<div class="day-text">${entry.summary || entry.title}</div>` : ''}</div>
    </div>`;
  }).join('');
  return `<div class="root">
    <div class="top">
      <div class="big-title">This Week</div>
      <div class="nav">
        <span class="nav-b" id="btn-prev">◀</span>
        <span class="sub">${fmt(start)} – ${fmt(end)}</span>
        <span class="nav-b" id="btn-next">▶</span>
      </div>
    </div>
    <div class="cal">${cols}</div>
    ${S.loading ? '<div style="font-size:11px;color:#aaa;margin-top:8px;text-transform:uppercase;letter-spacing:1px">Loading...</div>' : ''}
    ${S.error ? `<div class="error" style="margin-top:8px">${S.error}</div>` : ''}
    <div class="settings-btn" id="btn-settings">⚙ Settings</div>
  </div>`;
}

function bindEvents() {
  document.getElementById('btn-connect')?.addEventListener('click', () => {
    S.apiKey = document.getElementById('f-key').value.trim();
    S.dbId = document.getElementById('f-db').value.trim();
    S.propName = document.getElementById('f-prop').value.trim() || '에너지 레벨';
    if (!S.apiKey || !S.dbId) { S.error = 'API Key와 DB ID를 입력해주세요.'; render(); return; }
    localStorage.setItem('nw_apiKey', S.apiKey);
    localStorage.setItem('nw_dbId', S.dbId);
    localStorage.setItem('nw_propName', S.propName);
    localStorage.setItem('nw_screen', 'widget');
    S.screen = 'widget'; fetchEntries();
  });
  document.getElementById('btn-prev')?.addEventListener('click', () => { S.weekOffset--; fetchEntries(); });
  document.getElementById('btn-next')?.addEventListener('click', () => { S.weekOffset++; fetchEntries(); });
  document.getElementById('btn-settings')?.addEventListener('click', () => { S.screen='setup'; S.error=''; render(); });
}

render();
if (S.screen === 'widget') fetchEntries();
</script>
</body>
</html>
